  --accent:#FF6FA5; --accent2:#6FCBFF; --accent3:#FFD166; --border:#FFE1EE;
  --danger:#FF4B5C; --good:#3DBE8B; --radius:16px; --shadow:0 4px 16px rgba(255,111,165,.14);
}
html[data-theme="navy"]{
  --bg:#0B0F1A; --surface:#141B2C; --surface2:#1B2438; --text:#EDEEF3; --sub:#9AA3B8;
  --accent:#E8B44C; --accent2:#24304C; --accent3:#0F1626; --border:#2A3550;
  --danger:#FF6B6B; --good:#4CD3A0; --shadow:0 4px 16px rgba(0,0,0,.4);
}
html[data-theme="mint"]{

  --accent:#A78BFA; --accent2:#5FD9B4; --accent3:#FFD166; --border:#E3DCFF;

html[data-theme="mono"]{

body{
  margin:0; background:var(--bg); color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;

}
header{

  border-bottom:1px solid var(--border); padding:14px 16px;
  display:flex; align-items:center; justify-content:space-between;
}
header h1{font-size:17px; margin:0; font-weight:800; letter-spacing:.02em;}
header .sub{font-size:11px; color:var(--sub); margin-top:2px;}
.iconbtn{

  width:38px; height:38px; display:flex; align-items:center; justify-content:center;

}
main{padding:16px; max-width:640px; margin:0 auto;}
.card{

}
.card h2{font-size:14px; margin:0 0 12px; font-weight:800; display:flex; align-items:center; gap:6px;}
.card h2 .badge{background:var(--accent); color:#fff; font-size:10px; padding:2px 8px; border-radius:20px; font-weight:700;}
.card h2 .badge.good{background:var(--good);}
.section-tabs{display:flex; gap:6px; overflow-x:auto; padding:4px 16px 12px; -ms-overflow-style:none; scrollbar-width:none;}
.section-tabs::-webkit-scrollbar{display:none;}
.section-tabs button{

  padding:8px 14px; border-radius:20px; font-size:12.5px; font-weight:700; cursor:pointer; white-space:nowrap;

.section-tabs button.active{background:var(--accent); border-color:var(--accent); color:#fff;}
.row{display:flex; gap:8px; align-items:center;}
.row + .row{margin-top:8px;}
.row2{display:grid; grid-template-columns:1fr 1fr; gap:8px;}

textarea{resize:vertical; min-height:70px; line-height:1.5;}
label.field{display:block; font-size:11.5px; color:var(--sub); margin-bottom:4px; font-weight:700;}
.field-group{margin-bottom:10px;}

.list-item .actions{display:flex; gap:6px; flex-shrink:0;}
.iconsm{background:none; border:none; font-size:15px; cursor:pointer; color:var(--sub); padding:4px;}

// 発送済み以降（ほぼ確定）の交換記録に紐づく「渡す予定」数量を集計
function calcPendingOutQty(itemId){
  const CONFIRMED = ['発送済み','受取確認待ち'];
  let total=0;
  state.exchangeRecords.forEach(r=>{
    if(!CONFIRMED.includes(r.status)) return;
    (r.outItemsLinked||[]).forEach(o=>{ if(o.itemId===itemId) total+=Number(o.qty)||0; });
  });
  return total;
}
function calcPendingSecuredQty(itemId){
  const CONFIRMED = ['発送済み','受取確認待ち'];
  let total=0;
  state.exchangeRecords.forEach(r=>{
    if(!CONFIRMED.includes(r.status)) return;
    (r.inItemsLinked||[]).forEach(i=>{ if(i.linkedItemId===itemId) total+=Number(i.qty)||0; });
  });
  return total;
}

/* ---------------- Gemini APIによる商品ページスクショ解析 ---------------- */
function resizeImageFile(file, maxDim=800, quality=0.8){
  return new Promise((resolve,reject)=>{
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = ()=>{
      let w=img.width, h=img.height;
      if(w>h){ if(w>maxDim){ h=Math.round(h*maxDim/w); w=maxDim; } }
      else { if(h>maxDim){ w=Math.round(w*maxDim/h); h=maxDim; } }
      const canvas=document.createElement('canvas'); canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      canvas.toBlob(blob=>{ URL.revokeObjectURL(url); resolve(blob||file); }, 'image/jpeg', quality);
    };
    img.onerror = ()=>{ URL.revokeObjectURL(url); resolve(file); };
    img.src = url;
  });
}
function blobToDataURL(blob){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = ()=>resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}
const MAX_IMAGE_DATAURL_BYTES = 650000; // Firestoreの1ドキュメント1MB制限に対する安全マージン（グッズ帳と同方式）
async function uploadItemImage(file, itemId){
  // Firebase Storageは使わず、グッズ帳と同じくFirestoreにbase64で保存する
  let quality = 0.8, maxDim = 800;
  for(let i=0;i<4;i++){
    const resized = await resizeImageFile(file, maxDim, quality);
    const dataUrl = await blobToDataURL(resized);
    if(dataUrl.length <= MAX_IMAGE_DATAURL_BYTES || (quality<=0.4 && maxDim<=400)) return dataUrl;
    quality = Math.max(0.4, quality-0.15);
    maxDim = Math.max(400, Math.round(maxDim*0.8));
  }
  return await blobToDataURL(await resizeImageFile(file, 400, 0.4));
}
function fileToBase64(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = ()=>resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
// 503(モデル過負荷)・429(レート制限)エラー時に指数バックオフで自動リトライする（グッズ帳と同方式）
async function fetchGeminiWithRetry(url, options, maxRetries = 3){
  let lastRes;
  for(let attempt = 0; attempt <= maxRetries; attempt++){
    lastRes = await fetch(url, options);
    if(lastRes.status !== 503 && lastRes.status !== 429) return lastRes;
    if(attempt === maxRetries) return lastRes;
    const waitMs = 1000 * Math.pow(2, attempt);
    await new Promise(r => setTimeout(r, waitMs));
  }
  return lastRes;
}
async function analyzeScreenshotWithGemini(file){
  const base64 = await fileToBase64(file);
  const prompt = `この画像は推し活グッズの商品ページのスクリーンショットです。画像内から商品情報を抽出してください。
1つの商品ページに複数キャラクター分の商品が並んでいる場合（例：全キャラ分の缶バッジ一覧など）は、キャラクターごとに配列の要素を分けてください。
以下のJSON形式のみで返答してください（説明文は不要）:
{"items":[{"name":"商品名（絵柄・シリーズ名を含めてよい）","characterName":"キャラクター名（不明なら空文字）","price":数値（不明なら0）,"brand":"発売元・ブランド名（不明なら空文字）"}]}`;
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent`;
  const res = await fetchGeminiWithRetry(url, {
    method:'POST', headers:{'Content-Type':'application/json', 'X-goog-api-key': GEMINI_API_KEY},
    body: JSON.stringify({ contents:[{ parts:[ {text:prompt}, {inline_data:{mime_type:file.type, data:base64}} ] }] })
  });
  if(!res.ok){
    const reasons = { 429: 'レート制限に達した', 503: 'サーバー混雑中', 404: 'モデルが見つからない', 400: 'リクエスト不正' };
    const reason = reasons[res.status] || '不明なエラー';
    throw new Error(`Gemini APIエラー ${res.status}（${reason}）`);
  }
  const json = await res.json();
  const text = json.candidates?.[0]?.content?.parts?.[0]?.text || '{}';
  const cleaned = text.replace(/```json|```/g,'').trim();
  let parsed;
  try{ parsed = JSON.parse(cleaned); }catch(e){ throw new Error('解析結果の読み取りに失敗しました'); }
  return parsed.items || [];
}
function guessOshiNameFromCharacter(characterName){
  if(!characterName) return '';
  const oshis = allOshiList();
  const hit = oshis.find(o=>o.oshiName && characterName.includes(o.oshiName));
  return hit ? hit.oshiName : '';
}

let packOrderMigrated = false;
async function migratePackingMethodOrder(){
  if(packOrderMigrated) return;
  packOrderMigrated = true;

function renderDashboardTab(){
  const activeEx = state.exchangeRecords.filter(r=>r.status!=='完了');
  const shippingAlerts = activeEx.map(r=>({r, msg:exchangeReminder(r)})).filter(x=>x.msg);
  const followStalled = activeEx.filter(r=>['フォロー待ち','DM待ち'].includes(r.status) && daysSince(r.statusUpdatedAt||r.date)>=FOLLOW_REMINDER_DAYS);
  const negotiationStalled = activeEx.filter(r=>r.status==='交渉中' && daysSince(r.statusUpdatedAt||r.date)>=NEGOTIATION_REMINDER_DAYS);
  const listingStalled = state.items.filter(it=>it.saleStatus==='出品中' && daysSince(it.saleStatusDate)>=LISTING_REMINDER_DAYS);
  const thisMonth = todayStr().slice(0,7);
  const monthExchangeCount = state.exchangeRecords.filter(r=>(r.date||'').slice(0,7)===thisMonth).length;
  const monthSoldItems = state.items.filter(i=>['売却済み','発送済み'].includes(i.saleStatus) && i.soldDate && i.soldDate.slice(0,7)===thisMonth);
  const monthProfit = monthSoldItems.reduce((s,i)=>s+(i.profitAmount||0),0);

  // 推し別グッズ増加数（今月・グッズ帳連携データより）
  const monthGoodsItems = state.goodsItems.filter(i=>(i.date||'').slice(0,7)===thisMonth);
  const byChar = {};
  monthGoodsItems.forEach(i=>{ byChar[i.characterId] = (byChar[i.characterId]||0) + (Number(i.qty)||1); });
  const charStats = Object.keys(byChar).map(cid=>{
    const ch = state.goodsCharacters.find(c=>c.id===cid);
    return { name: ch?ch.name:'（不明）', count: byChar[cid] };
  }).sort((a,b)=>b.count-a.count);

  return `
    <div class="card"><h2>📬 発送アラート <span class="badge">${shippingAlerts.length}件</span></h2>
      ${shippingAlerts.length ? shippingAlerts.map(x=>{
        return `<div class="list-item"><div><div class="meta">${escapeHtml(partnerLabel(x.r))}</div><div class="sub-meta">${escapeHtml(x.msg)}</div></div></div>`;
      }).join('') : `<div class="empty">今日・明日発送予定のものはありません</div>`}
    </div>
    <div class="card"><h2>📨 フォロー・DM停滞中 <span class="badge">${followStalled.length}件</span></h2>
      ${followStalled.length ? followStalled.map(r=>{
        return `<div class="list-item"><div><div class="meta">${escapeHtml(partnerLabel(r))}</div><div class="sub-meta">${escapeHtml(r.status)}のまま${daysSince(r.statusUpdatedAt||r.date)}日経過</div></div></div>`;
      }).join('') : `<div class="empty">停滞中のフォロー・DM待ちはありません</div>`}
    </div>
    <div class="card"><h2>⏰ 交渉停滞中 <span class="badge">${negotiationStalled.length}件</span></h2>
      ${negotiationStalled.length ? negotiationStalled.map(r=>{
        return `<div class="list-item"><div><div class="meta">${escapeHtml(partnerLabel(r))}</div><div class="sub-meta">${daysSince(r.statusUpdatedAt||r.date)}日停滞中</div></div></div>`;
      }).join('') : `<div class="empty">停滞中の交渉はありません</div>`}
    </div>
    <div class="card"><h2>📦 出品長期化 <span class="badge">${listingStalled.length}件</span></h2>
      ${listingStalled.length ? listingStalled.map(it=>`<div class="list-item"><div><div class="meta">${escapeHtml(it.name)}</div><div class="sub-meta">出品から${daysSince(it.saleStatusDate)}日経過</div></div></div>`).join('') : `<div class="empty">長期化している出品はありません</div>`}
    </div>
    <div class="card"><h2>📊 今月のサマリー</h2>
      <div class="stat-grid">
        <div class="stat-box"><div class="label">今月の交換件数</div><div class="value">${monthExchangeCount}件</div></div>
        <div class="stat-box"><div class="label">今月の売買利益</div><div class="value">${yen(monthProfit)}</div></div>
      </div>
    </div>
    <div class="card"><h2>🎀 推し別グッズ増加数（今月・グッズ帳連携）</h2>
      ${charStats.length ? renderBarChart(charStats.map(c=>c.name), charStats.map(c=>c.count)) : `<div class="empty">今月はまだグッズ帳への追加がありません</div>`}
    </div>`;
}
function renderBarChart(labels, values){
  const max = Math.max(...values, 1);
  return `<div style="display:flex; flex-direction:column; gap:8px; margin-top:6px;">
    ${labels.map((l,i)=>`
      <div>
        <div style="display:flex; justify-content:space-between; font-size:11.5px; margin-bottom:3px;"><span>${escapeHtml(l)}</span><span style="font-weight:800; color:var(--accent);">${values[i]}個</span></div>
        <div style="background:var(--surface2); border-radius:8px; height:10px; overflow:hidden;"><div style="width:${Math.max(4,Math.round(values[i]/max*100))}%; height:100%; background:var(--accent);"></div></div>
      </div>`).join('')}
  </div>`;
}

/* 厚み(cm)・重さ(kg)から条件を満たす発送方法を安い順に返す（サイズは長辺のみわかる想定のため長辺・厚さ・重量のみで判定） */
function recommendShippingMethods(thicknessCm, weightKg){
  return state.shippingMethods.filter(s=>{
    if(s.thickness!=null && thicknessCm>s.thickness) return false;
    if(s.weight!=null && weightKg>s.weight) return false;
    return true;
  }).sort((a,b)=>{
    const pa = a.price>=0 ? a.price : Infinity;
    const pb = b.price>=0 ? b.price : Infinity;
    return pa-pb;
  });
}

  document.querySelectorAll('[data-act="add-oshi"]').forEach(b=>b.onclick=()=>openTextModal({title:'推しを追加', placeholder:'例）イブラヒム', onSave: async(v)=>{ if(!v.trim())return; const g=state.genres.find(x=>x.id===b.dataset.id); await updateDocIn('genres', b.dataset.id, {oshiList:[...(g.oshiList||[]),{id:uidGen(),name:v.trim()}]}); showToast('追加しました'); }}));

  document.querySelectorAll('details[data-pg]').forEach(d=>{ d.addEventListener('toggle', ()=>{ ui.shipOpenGroups[d.dataset.pg] = d.open; }); });
  document.querySelectorAll('[data-act="toggle-ship"]').forEach(b=>b.onchange=async()=>{ await updateDocIn('shippingMethods', b.dataset.id, {visible: b.checked}); });
  const shipDiagBtn=document.getElementById('shipDiagBtn');
  if(shipDiagBtn) shipDiagBtn.onclick=()=>{
    const thickMm = Number(document.getElementById('shipDiagThick').value)||0;
    const weightG = Number(document.getElementById('shipDiagWeight').value)||0;
    const thickCm = thickMm/10, weightKg = weightG/1000;
    const results = recommendShippingMethods(thickCm, weightKg);
    const box = document.getElementById('shipDiagResult');
    if(!results.length){ box.innerHTML = `<div class="empty">条件に合う発送方法が見つかりませんでした（サイズオーバーの可能性）</div>`; return; }
    box.innerHTML = results.map((s,i)=>`
      <div class="list-item">
        <div>
          <div class="meta">${i===0?'👑 ':''}${escapeHtml(s.name)}${s.serviceGroup?` <span class="tag">${escapeHtml(s.serviceGroup)}</span>`:''} ${s.visible?'':'<span class="tag">非表示中</span>'}</div>
          <div class="sub-meta">${escapeHtml(s.provider||'')}　${s.price>=0?yen(s.price):'料金別途'}</div>
        </div>
      </div>`).join('') + `<div class="hint">サイズ・料金は目安であり保証はしません。安い順に表示しています</div>`;
  };

  const addPackBtn=document.getElementById('addPackBtn'); if(addPackBtn) addPackBtn.onclick=()=>openPackModal({});
  document.querySelectorAll('[data-act="edit-pack"]').forEach(b=>b.onclick=()=>openPackModal(state.packingMethods.find(p=>p.id===b.dataset.id)));
  document.querySelectorAll('[data-act="del-pack"]').forEach(b=>b.onclick=async()=>{ if(confirm('削除しますか？')){ await deleteDocIn('packingMethods', b.dataset.id); showToast('削除しました'); } });
  document.querySelectorAll('[data-act="toggle-pack"]').forEach(b=>b.onchange=async()=>{ await updateDocIn('packingMethods', b.dataset.id, {visible: b.checked}); });

  const addDmBtn=document.getElementById('addDmBtn'); if(addDmBtn) addDmBtn.onclick=()=>openDmModal({});
  document.querySelectorAll('[data-act="edit-dm"]').forEach(b=>b.onclick=()=>openDmModal(state.dmTemplates.find(t=>t.id===b.dataset.id)));
  document.querySelectorAll('[data-act="del-dm"]').forEach(b=>b.onclick=async()=>{ if(confirm('削除しますか？')){ await deleteDocIn('dmTemplates', b.dataset.id); showToast('削除しました'); } });
}

const CATEGORY_THICKNESS_MM = {
  '缶バッジ25mm':1.5, '缶バッジ32mm':2, '缶バッジ38mm':2, '缶バッジ44mm':2.5, '缶バッジ57mm':3, '缶バッジ76mm':3.5,

  '缶ミラー':4, 'ピンバッジ':3, 'アクリルキーホルダー':4, 'アクリルスタンド':5,

  '色紙':1, 'クリアファイル':0.5, 'うちわ':5, 'ラバーストラップ':4, 'フォト風カード':0.3,
  'ぬいぐるみ':50, 'Tシャツ':15, 'アパレル':15,
};
// 缶バッジは教えてもらった実測重量、それ以外は目安
const CATEGORY_WEIGHT_G = {
  '缶バッジ25mm':2, '缶バッジ32mm':3, '缶バッジ38mm':5, '缶バッジ44mm':6, '缶バッジ57mm':10, '缶バッジ76mm':18,
  '缶バッジ(四角形)':5, '缶バッジ(ハート型)':9,
  '缶ミラー':15, 'ピンバッジ':5, 'アクリルキーホルダー':10, 'アクリルスタンド':15,
  'アクリルスタンド(小)':10, 'アクリルスタンド(大)':25, 'トレカ':1, 'ブロマイド':2, 'ポストカード':2,
  '色紙':15, 'クリアファイル':10, 'うちわ':20, 'ラバーストラップ':8, 'フォト風カード':2,
  'ぬいぐるみ':100, 'Tシャツ':150, 'アパレル':150,
};
// プチプチ・段ボール補強など、梱包材そのものが1層あたり足す厚み(mm)・重さ(g)の目安
const BUBBLE_MM_PER_LAYER = 2.5, BUBBLE_G_PER_LAYER = 2;
const BOARD_MM_PER_SHEET = 1.5, BOARD_G_PER_SHEET = 5;
// 紙類は水濡れ防止・両面補強がマスト
const PAPER_CATEGORIES = ['トレカ','ブロマイド','ポストカード','色紙','クリアファイル','フォト風カード'];
const ACRYLIC_CATEGORIES = ['アクリルキーホルダー','アクリルスタンド','アクリルスタンド(小)','アクリルスタンド(大)','缶ミラー'];
function openPackModal(item){
  const isEdit=!!item.id; const host=document.getElementById('modalHost');
  host.innerHTML=`<div class="modal-overlay" id="ov"><div class="modal"><h3>${isEdit?'梱包方法を編集':'梱包方法を追加'}</h3>
    <div class="field-group"><label class="field">名称</label><input type="text" id="pkName" placeholder="例）防水（プチプチ2重）" value="${escapeHtml(item.name||'')}"></div>
    <div class="field-group"><label class="field">対象カテゴリー</label><input type="text" id="pkCategory" list="pkCatList" placeholder="例）缶バッジ57mm" value="${escapeHtml(item.category||'')}"><datalist id="pkCatList">${Object.keys(CATEGORY_THICKNESS_MM).map(c=>`<option value="${c}">`).join('')}</datalist></div>

    <div class="row2">
      <div class="field-group"><label class="field">まとめ梱包の固定分（mm・段ボール台紙+OPP袋等）</label><input type="number" id="pkFixedThick" value="${item.baseThicknessMm??0}" step="0.1"></div>
      <div class="field-group"><label class="field">まとめ梱包の固定分（g）</label><input type="number" id="pkFixedWeight" value="${item.baseWeightG??0}"></div>
    </div>
    <div class="hint" style="margin-top:-6px; margin-bottom:10px;">紙類など複数枚まとめて1つの段ボール台紙+OPP袋で梱包する場合の固定分。個別包装するグッズは0のままでOK</div>

    <div class="card" style="background:var(--surface2); border:1px solid var(--border); padding:12px; margin:0 0 12px;">
      <div style="font-size:11.5px; font-weight:800; margin-bottom:8px;">厚み・重さの自動計算</div>
      <div class="row2">
        <div><label class="field">グッズ自体の厚み(mm)</label><input type="number" id="pkBaseThick" value="0" step="0.1"></div>
        <div><label class="field">グッズ自体の重さ(g)</label><input type="number" id="pkBaseWeight" value="0"></div>
      </div>
      <div class="row2" style="margin-top:8px;">
        <div><label class="field">プチプチ枚数（重ね数）</label><input type="number" id="pkBubbleLayers" value="0" min="0"></div>
        <div><label class="field">段ボール補強（枚数・片面1/両面2）</label><input type="number" id="pkBoardSheets" value="0" min="0"></div>
      </div>
      <div class="hint" style="margin-top:6px;">プチプチ1枚あたり約${BUBBLE_MM_PER_LAYER}mm・${BUBBLE_G_PER_LAYER}g、段ボール補強1枚あたり約${BOARD_MM_PER_SHEET}mm・${BOARD_G_PER_SHEET}gとして自動計算します（下の欄に反映、手直しも可）</div>
    </div>

    <div class="row2">
      <div class="field-group"><label class="field">1個/1枚あたりの増分厚み（mm）</label><input type="number" id="pkThick" value="${item.unitThicknessMm??''}" step="0.1"></div>
      <div class="field-group"><label class="field">1個/1枚あたりの増分重さ（g）</label><input type="number" id="pkWeight" value="${item.unitWeightG??''}"></div>
    </div>
    <div class="field-group"><label class="field">メモ</label><input type="text" id="pkNote" value="${escapeHtml(item.note||'')}"></div>
    <div class="field-group"><label class="field">梱包手順（DM文面に自動挿入）</label><textarea id="pkProcedure" placeholder="例）プチプチ2重→水濡れ防止OPP袋">${escapeHtml(item.procedureText||'')}</textarea></div>
    <div class="row"><label class="toggle"><input type="checkbox" id="pkVisible" ${item.visible!==false?'checked':''}><span class="slider"></span></label><span style="font-size:12.5px;">一覧に表示する</span></div>
    <div class="modal-actions"><button class="btn btn-ghost" id="mCancel">キャンセル</button><button class="btn btn-primary" id="mSave">保存</button></div>
  </div></div>`;
  function recalcFromParts(){
    const base = Number(document.getElementById('pkBaseThick').value)||0;
    const baseW = Number(document.getElementById('pkBaseWeight').value)||0;
    const layers = Number(document.getElementById('pkBubbleLayers').value)||0;
    const boards = Number(document.getElementById('pkBoardSheets').value)||0;
    document.getElementById('pkThick').value = (base + layers*BUBBLE_MM_PER_LAYER + boards*BOARD_MM_PER_SHEET).toFixed(1);
    document.getElementById('pkWeight').value = Math.round(baseW + layers*BUBBLE_G_PER_LAYER + boards*BOARD_G_PER_SHEET);
  }
  document.getElementById('pkCategory').addEventListener('input', (e)=>{
    const cat = e.target.value.trim();
    const thick = CATEGORY_THICKNESS_MM[cat], weight = CATEGORY_WEIGHT_G[cat];
    if(thick!=null) document.getElementById('pkBaseThick').value = thick;
    if(weight!=null) document.getElementById('pkBaseWeight').value = weight;
    if(PAPER_CATEGORIES.includes(cat) && !document.getElementById('pkProcedure').value){
      document.getElementById('pkProcedure').value = '1枚ずつスリーブ等で保護→両面段ボール補強→水濡れ防止OPP袋（紙類は水濡れ防止・両面補強がマストです）';
      document.getElementById('pkBoardSheets').value = 2;
    }
    if(ACRYLIC_CATEGORIES.includes(cat) && !document.getElementById('pkProcedure').value){
      document.getElementById('pkProcedure').value = 'プチプチ3重→OPP袋（アクリル製品はプチプチ3重が基本です）';
      document.getElementById('pkBubbleLayers').value = 3;
    }
    recalcFromParts();
  });
  ['pkBaseThick','pkBaseWeight','pkBubbleLayers','pkBoardSheets'].forEach(id=>document.getElementById(id).addEventListener('input', recalcFromParts));
  document.getElementById('mCancel').onclick=closeModal;
  document.getElementById('ov').onclick=(e)=>{ if(e.target.id==='ov') closeModal(); };
  document.getElementById('mSave').onclick=async()=>{
    const name=document.getElementById('pkName').value.trim(); if(!name) return;
    const data={name, category:document.getElementById('pkCategory').value, baseThicknessMm:Number(document.getElementById('pkFixedThick').value)||0, baseWeightG:Number(document.getElementById('pkFixedWeight').value)||0, unitThicknessMm:Number(document.getElementById('pkThick').value)||0, unitWeightG:Number(document.getElementById('pkWeight').value)||0, note:document.getElementById('pkNote').value, procedureText:document.getElementById('pkProcedure').value, visible:document.getElementById('pkVisible').checked};
    if(isEdit) await updateDocIn('packingMethods', item.id, data); else await addDocTo('packingMethods', {...data, sortOrder: Math.max(999, ...state.packingMethods.map(p=>p.sortOrder??0))+1});
    showToast('保存しました'); closeModal();
  };
}

function renderItemsTab(){

}
function renderReleaseCard(release){
  const entries = state.items.filter(i=>i.releaseId===release.id).sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0));
  const giveEntries = entries.filter(e=>!e.isWanted);
  const wantEntries = entries.filter(e=>e.isWanted);
  return `<div class="release-block" data-release-id="${release.id}" style="border:1px solid var(--border); border-radius:14px; padding:12px; margin-bottom:14px; background:var(--surface);">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
      <div style="font-size:13.5px; font-weight:800;">${escapeHtml(release.name)}</div>
      <div style="font-size:11px; color:var(--sub);">定価 ${yen(release.definedPrice)}${release.packingCategory?'・'+escapeHtml(release.packingCategory):''}</div>
    </div>
    ${giveEntries.length ? `<div class="item-grid">${giveEntries.map(renderItemGridCard).join('')}</div>` : `<div class="hint">譲れる絵柄はまだ登録されていません</div>`}
    ${wantEntries.length ? `
      <div style="border:2px dashed var(--gold); border-radius:12px; padding:10px; margin-top:10px; background:var(--surface2);">
        <div style="font-size:11px; font-weight:800; color:#8A6A00; margin-bottom:6px;">🔍 求めてる絵柄</div>
        ${wantEntries.map(renderWantRow).join('')}
      </div>` : ''}
    <div class="row" style="margin-top:8px; gap:6px;">
      <button class="btn btn-ghost btn-sm" style="flex:1;" data-act="add-entry" data-release="${release.id}">＋ 絵柄を追加</button>
      <button class="btn btn-ghost btn-sm" style="flex:1;" data-act="bulk-entry" data-release="${release.id}">＋ キャラ複数一括</button>
      <button class="iconsm" data-act="del-release" data-id="${release.id}">🗑️</button>
    </div>
  </div>`;
}
function renderItemGridCard(it){
  const pending = calcPendingOutQty(it.id);
  const thumbStyle = it.imageUrl ? `style="background-image:url('${it.imageUrl}')"` : '';
  return `<div class="item-grid-card" data-item-id="${it.id}">
    <div class="thumb" ${thumbStyle}>${it.imageUrl?'':'🖼️'}
      <span class="qty-badge">×${it.totalQty||0}</span>
      ${it.pinned?'<span class="pin-badge">📌</span>':''}
      <button class="del-badge" data-act="del-item" data-id="${it.id}">✕</button>
    </div>
    <div class="info">
      <div class="gname">${escapeHtml(it.oshiName||'')}</div>
      <div class="gtag">${escapeHtml(it.name||'')}</div>
      ${it.hasDamage?`<div class="damage-badge">⚠️ ${escapeHtml(it.damageNote||'難あり')}</div>`:''}
      ${pending>0?`<div class="gtag">取引中${pending}→完了後${Math.max(0,(it.totalQty||0)-pending)}予定</div>`:''}
    </div>
  </div>`;
}
function renderWantRow(it){
  const secured = calcPendingSecuredQty(it.id);
  const hasTarget = it.wantedTarget!=null;
  const statusTxt = hasTarget
    ? `求${it.wantedTarget}個／確保${it.totalQty||0}個／残り${Math.max(0,it.wantedTarget-(it.totalQty||0))}個`
    : `上限なし・これまでに${it.totalQty||0}個確保`;
  return `<div class="list-item" data-item-id="${it.id}">

function renderLineChart(labels, values){
  const w=560,h=140,pad=30;
  const max=Math.max(...values,1), min=Math.min(...values,0);
  const range=(max-min)||1;
  const stepX = labels.length>1 ? (w-pad*2)/(labels.length-1) : 0;
  const pts = values.map((v,i)=>{
    const x = pad + stepX*i;
    const y = h-pad - ((v-min)/range)*(h-pad*2);
    return [x,y];
  });
  const pathD = pts.map((p,i)=>(i===0?'M':'L')+p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
  const dots = pts.map((p,i)=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="3.5" fill="var(--accent)"></circle>`).join('');
  const labelsSvg = labels.map((l,i)=>`<text x="${pts[i][0].toFixed(1)}" y="${h-8}" font-size="9" fill="var(--sub)" text-anchor="middle">${l.slice(5)}</text>`).join('');
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%; height:140px;">
    <path d="${pathD}" fill="none" stroke="var(--accent)" stroke-width="2.5"/>
    ${dots}${labelsSvg}
  </svg>`;
}
function downloadCsv(filename, rows){
  const csv = rows.map(row=>row.map(v=>{
    const s = String(v??'');
    return /[",\n]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s;
  }).join(',')).join('\r\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=filename; document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}

    <div class="modal-actions"><button class="btn btn-ghost" id="mCancel">キャンセル</button><button class="btn btn-primary" id="mSave">保存</button></div>
  </div></div>`;
  function recalc(){
    const platform = state.platforms.find(p=>p.id===document.getElementById('msPlatform').value);
    const shipMethod = state.shippingMethods.find(s=>s.id===document.getElementById('msShipMethod').value);
    const price = Number(document.getElementById('msPrice').value)||0;
    let ship = Number(document.getElementById('msShip').value)||0;
    if(shipMethod && shipMethod.price>=0 && !document.getElementById('msShip').dataset.touched) { ship = shipMethod.price; document.getElementById('msShip').value = ship; }
    const feeRate = platform ? platform.feeRate : 0;
    const fee = Math.round(price*feeRate/100);
    const proceeds = price - fee;
    const profit = proceeds - ship - effectiveCost;
    const box=document.getElementById('msResult');
    box.style.display='block';
    box.textContent = `手数料(${feeRate}%): -${fee}円\n入金額: ${proceeds}円\n送料差引後: ${proceeds-ship}円\n原価差引後の利益: ${profit}円`;
  }
  document.getElementById('msShip').addEventListener('input', (e)=>{ e.target.dataset.touched='1'; });
  ['msPlatform','msShipMethod','msPrice','msShip'].forEach(id=>document.getElementById(id).addEventListener('input', recalc));

  document.getElementById('ov').onclick=(e)=>{ if(e.target.id==='ov') closeModal(); };
  document.getElementById('mSave').onclick=async()=>{
    const platform = state.platforms.find(p=>p.id===document.getElementById('msPlatform').value);
    const price = Number(document.getElementById('msPrice').value)||0;
    const ship = Number(document.getElementById('msShip').value)||0;
    const feeRate = platform ? platform.feeRate : 0;
    const fee = Math.round(price*feeRate/100);
    const profit = price - fee - ship - effectiveCost;
    await updateDocIn('exchangeItems', item.id, {

function exchangeReminder(r){
  if(!r.scheduledDate || ['発送済み','受取確認待ち','完了'].includes(r.status)) return '';
  const sd = new Date(r.scheduledDate+'T00:00:00'); const td = new Date(todayStr()+'T00:00:00');
  const diff = Math.round((sd-td)/86400000);
  if(diff===0) return '🚚 本日発送予定です！発送忘れていませんか？';
  if(diff===1) return '📅 明日発送予定です（前日確認）';
  if(diff<0) return `⚠️ 発送予定日を${Math.abs(diff)}日過ぎています`;
  return '';
}

/* グッズ帳（推し活グッズ帳）のcharactersコレクションから推し名で検索、なければ新規作成 */
async function findOrCreateGoodsCharacter(oshiName){
  if(!oshiName) return null;
  const snap = await getDocs(query(collection(db,'users',uid,'characters')));
  const found = snap.docs.find(d=>(d.data().name||'')===oshiName);
  if(found) return found.id;
  const ref = await addDoc(collection(db,'users',uid,'characters'), {
    name: oshiName, color:'#FF6FA5', image:null, shopUrl:'', order: snap.size, createdAt: serverTimestamp(),
  });
  return ref.id;
}
/* imageUrlは既にFirestore保存用のdata URL（base64）なので、そのまま使う。念のためBlob URL等が来た場合のみ変換する */
async function urlToBase64(url){
  if(url && url.startsWith('data:')) return url;
  const res = await fetch(url);
  const blob = await res.blob();
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = ()=>resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}
async function applyExchangeCompletion(record){
  for(const o of (record.outItemsLinked||[])){
    const it = state.items.find(i=>i.id===o.itemId);
    if(!it) continue;
    const newTotal = Math.max(0, (it.totalQty||0) - (Number(o.qty)||0));
    await updateDocIn('exchangeItems', it.id, { totalQty:newTotal });
  }
  for(const inp of (record.inItemsLinked||[])){
    let newItemId, releaseId = inp.releaseId||null, category='';
    const release = state.releases.find(r=>r.id===releaseId);
    if(release) category = release.packingCategory||'';

    if(inp.linkedItemId){
      // 既存の「求めてる絵柄」エントリの所持数を加算
      const w = state.items.find(x=>x.id===inp.linkedItemId);
      if(w){
        await updateDocIn('exchangeItems', w.id, { totalQty: (w.totalQty||0) + (Number(inp.qty)||0) });
        newItemId = w.id;
        releaseId = w.releaseId||releaseId;
      }
    } else {
      const newRef = await addDocTo('exchangeItems', {
        releaseId, oshiName: inp.oshiName||'', name: inp.name||'',
        totalQty: Number(inp.qty)||1, hasDamage:false, damageNote:'',
        imageUrl: inp.imageUrl||null,
        isWanted:false, wantedTarget:null, priority:false,
        saleStatus:null, saleStatusDate:todayStr(),
      });
      newItemId = newRef?.id;
    }

    // 推し活グッズ帳への自動連携
    try{
      const goodsCharId = await findOrCreateGoodsCharacter(inp.oshiName);
      if(goodsCharId){
        let images = [];
        if(inp.imageUrl){
          try{ const b64 = await urlToBase64(inp.imageUrl); images = [b64]; }catch(e){ /* 画像変換失敗時は画像なしで登録 */ }
        }
        const goodsRef = await addDoc(collection(db,'users',uid,'items'), {
          characterId: goodsCharId, name: inp.name||'', series: release?release.name:'', category,
          price:0, qty:Number(inp.qty)||1, date:todayStr(), memo:'交換アプリで入手',
          eventName:'', location:'', status:'unopened', images, image: images[0]||null,
          createdAt: serverTimestamp(),
        });
        if(newItemId) await updateDocIn('exchangeItems', newItemId, {linkedGoodsId: goodsRef.id});
      }
    }catch(e){ console.error('グッズ帳への連携に失敗しました', e); showToast('グッズ帳への自動登録に失敗しました（在庫への反映は完了しています）'); }
  }
}

        <label class="field">精算金額（円）</label><input type="number" id="exShortfall" value="${item.shortfallAmount??0}">
        <div class="row" style="margin:8px 0 6px;"><label class="toggle"><input type="checkbox" id="exPaymentReceived" ${item.paymentReceived?'checked':''}><span class="slider"></span></label><span style="font-size:12.5px; font-weight:700;">入金確認済み</span></div>
        <label class="field">入金日（任意）</label><input type="date" id="exPaymentDate" value="${item.paymentDate||''}">
      </div>
    </div>
    <div class="row2">
      <div class="field-group"><label class="field">発送方法</label><select id="exDelivery"><option value="手渡し" ${item.deliveryMethod==='手渡し'?'selected':''}>手渡し</option><option value="郵送" ${item.deliveryMethod==='郵送'?'selected':''}>郵送</option></select></div>
      <div class="field-group"><label class="field">予定日</label><input type="date" id="exScheduled" value="${item.scheduledDate||''}"></div>
    </div>
    <div class="row" style="margin-bottom:10px;"><label class="toggle"><input type="checkbox" id="exSameDay" ${item.sameDayWish?'checked':''}><span class="slider"></span></label><span style="font-size:12.5px;">相手と同日発送を希望</span></div>
    <div class="row2">
      <div class="field-group"><label class="field">発送手段プリセット</label><select id="exShip"><option value="">未定</option></select></div>
      <div class="field-group"><label class="field">梱包方法</label><select id="exPack"><option value="">未定</option>${state.packingMethods.map(p=>`<option value="${p.id}" ${item.packingMethodId===p.id?'selected':''}>${escapeHtml(p.name)}</option>`).join('')}</select></div>
    </div>
    <div id="exShipEstimate" class="hint" style="margin-top:-6px; margin-bottom:8px;"></div>
    <div id="exShipWarning"></div>
    <div class="field-group"><label class="field">ステータス</label><select id="exStatus">${EXCHANGE_STATUS_STEPS.map(s=>`<option ${item.status===s?'selected':''}>${s}</option>`).join('')}</select>
      ${item.status==='完了'&&item.stockApplied?'<div class="hint">✅ 在庫反映済みです</div>':'<div class="hint">「完了」で保存すると自動で在庫に反映されます（初回のみ）</div>'}</div>

    <div class="card" style="background:var(--surface2); border:1px solid var(--border); padding:12px; margin:0 0 12px;">
      <div style="font-size:12px; font-weight:800; margin-bottom:8px;">発送状況（自分／相手）</div>
      <div class="row2">
        <div>
          <div class="row" style="margin-bottom:6px;"><label class="toggle"><input type="checkbox" id="exMySent" ${item.mySent?'checked':''}><span class="slider"></span></label><span style="font-size:12px;">自分：発送済み</span></div>
          <label class="field">発送日</label><input type="date" id="exMySentDate" value="${item.mySentDate||''}">
          <label class="field" style="margin-top:6px;">追跡番号</label><input type="text" id="exMyTracking" value="${escapeHtml(item.myTracking||'')}">
        </div>
        <div>
          <div class="row" style="margin-bottom:6px;"><label class="toggle"><input type="checkbox" id="exTheirSent" ${item.theirSent?'checked':''}><span class="slider"></span></label><span style="font-size:12px;">相手：発送済み</span></div>
          <label class="field">発送日</label><input type="date" id="exTheirSentDate" value="${item.theirSentDate||''}">
          <label class="field" style="margin-top:6px;">追跡番号</label><input type="text" id="exTheirTracking" value="${escapeHtml(item.theirTracking||'')}">
        </div>
      </div>
      <div class="hint">両方「発送済み」になったらステータスを「受取確認待ち」に更新するのを忘れずに</div>
    </div>
    <button class="btn btn-primary btn-block" id="genFirstDmBtn" style="margin-bottom:10px;">📋 初回DM文面を自動生成する</button>
    <div class="field-group"><label class="field">DMテンプレート（ワンタップで挿入）</label>
      <div class="chip-select" id="exDmQuickButtons">${state.dmTemplates.map(t=>`<label style="cursor:pointer;" data-quickdm="${t.id}"><input type="radio" name="exDmQuick" style="display:none;">${escapeHtml(t.scene)}：${escapeHtml(t.name)}</label>`).join('') || '<span class="hint">マスタでDMテンプレを登録してください</span>'}</div>
      <select id="exDmSelect" style="display:none;"><option value="">選択して挿入</option>${state.dmTemplates.map(t=>`<option value="${t.id}">${escapeHtml(t.scene)} / ${escapeHtml(t.name)}</option>`).join('')}</select></div>
    ${recentDm.length?`<div class="field-group"><label class="field">過去の下書きから呼び出す</label><select id="exDmHistorySelect"><option value="">選択してください</option>${recentDm.map(h=>`<option value="${h.id}">${escapeHtml((h.text||'').slice(0,20))}…</option>`).join('')}</select></div>`:''}
    <textarea id="exCopyBox" style="display:none; min-height:220px;"></textarea>
    <button class="btn btn-ghost btn-block" id="exCopyBtn" style="display:none; margin-top:6px;">コピーする</button>
    <div class="modal-actions"><button class="btn btn-ghost" id="mCancel">キャンセル</button><button class="btn btn-primary" id="mSave">保存</button></div>
  </div></div>`;

  function bindRowEvents(){
    document.getElementById('exAddOutRow').onclick=()=>{ outRows.push({itemId:'',qty:1}); document.getElementById('exOutRows').insertAdjacentHTML('beforeend', outRowHtml({itemId:'',qty:1}, outRows.length-1)); };
    document.getElementById('exAddInRow').onclick=()=>{ inRows.push({oshiName:'',name:'',qty:1,linkedItemId:'',releaseId:''}); document.getElementById('exInRows').insertAdjacentHTML('beforeend', inRowHtml({oshiName:'',name:'',qty:1,linkedItemId:'',releaseId:''}, inRows.length-1)); };
  }
  bindRowEvents();

  function estimateOutSize(){
    const rows = [...document.querySelectorAll('#exOutRows [data-outrow]')];
    let thicknessMm=0, weightG=0; const usedNames=[]; const baseAdded=new Set();
    rows.forEach(row=>{
      const itemId = row.querySelector('.exOutItem').value;
      const qty = Number(row.querySelector('.exOutQty').value)||0;
      if(!itemId) return;
      const it = state.items.find(x=>x.id===itemId);
      if(!it) return;
      const release = state.releases.find(r=>r.id===it.releaseId);
      let pm = null;
      if(release && release.packingCategory){
        pm = state.packingMethods.find(p=>p.category===release.packingCategory && p.visible!==false) || state.packingMethods.find(p=>p.category===release.packingCategory);
      }
      if(pm){
        if(!baseAdded.has(pm.id)){ thicknessMm += (pm.baseThicknessMm||0); weightG += (pm.baseWeightG||0); baseAdded.add(pm.id); }
        thicknessMm += (pm.unitThicknessMm||0)*qty; weightG += (pm.unitWeightG||0)*qty; usedNames.push(pm.name);
      }
    });
    return {thicknessMm:Math.round(thicknessMm*10)/10, weightG:Math.round(weightG), usedNames};
  }
  function refreshShipRecommendation(){
    const est = estimateOutSize();
    const estBox = document.getElementById('exShipEstimate');
    estBox.textContent = (est.thicknessMm>0||est.weightG>0) ? `📦 推定サイズ：厚み約${est.thicknessMm}mm・重さ約${est.weightG}g（${[...new Set(est.usedNames)].join('、')}を基に算出）` : '梱包カテゴリー未設定のグッズは推定に含まれません';
    const shipSel = document.getElementById('exShip');
    const prevValue = shipSel.value;
    const recommended = (est.thicknessMm>0||est.weightG>0) ? recommendShippingMethods(est.thicknessMm/10, est.weightG/1000).filter(s=>s.visible && (s.platformGroup||'個人')==='個人') : [];
    const recIds = new Set(recommended.slice(0,5).map(s=>s.id));
    const others = visibleShip.filter(s=>!recIds.has(s.id));
    let html = '<option value="">未定</option>';
    if(recommended.length){
      html += `<optgroup label="🔍 このグッズにおすすめ">${recommended.slice(0,5).map(s=>`<option value="${s.id}">${escapeHtml(s.name)}（${s.price>=0?yen(s.price):'料金別途'}）</option>`).join('')}</optgroup>`;
    }
    html += `<optgroup label="その他の発送方法">${others.map(s=>`<option value="${s.id}">${escapeHtml(s.name)}</option>`).join('')}</optgroup>`;
    shipSel.innerHTML = html;
    shipSel.value = (prevValue && [...shipSel.options].some(o=>o.value===prevValue)) ? prevValue : (item.shippingMethodId && [...shipSel.options].some(o=>o.value===item.shippingMethodId) ? item.shippingMethodId : '');
    validateShipSelection();
  }
  function validateShipSelection(){
    const shipSel = document.getElementById('exShip');
    const warnBox = document.getElementById('exShipWarning');
    const s = state.shippingMethods.find(x=>x.id===shipSel.value);
    if(!s){ warnBox.innerHTML=''; return; }
    const est = estimateOutSize();
    const thicknessCm = est.thicknessMm/10, weightKg = est.weightG/1000;
    const overThick = s.thickness!=null && thicknessCm>s.thickness;
    const overWeight = s.weight!=null && weightKg>s.weight;
    if(overThick || overWeight){
      warnBox.innerHTML = `<div style="background:#FFE1E1; border:1px solid var(--danger); color:var(--danger); border-radius:10px; padding:8px 12px; font-size:12px; font-weight:700; margin-bottom:10px;">⚠️「${escapeHtml(s.name)}」だとサイズオーバーの可能性があります（${[overThick?'厚み':null, overWeight?'重さ':null].filter(Boolean).join('・')}が上限超え）。上の「おすすめ」から選び直してください</div>`;
    } else {
      warnBox.innerHTML = '';
    }
  }
  document.getElementById('exOutRows').addEventListener('input', refreshShipRecommendation);
  document.getElementById('exOutRows').addEventListener('change', refreshShipRecommendation);
  document.getElementById('exAddOutRow').addEventListener('click', ()=>setTimeout(refreshShipRecommendation, 0));
  document.getElementById('exShip').addEventListener('change', validateShipSelection);
  refreshShipRecommendation();
  document.getElementById('exInRows').addEventListener('change', (e)=>{
    if(!e.target.classList.contains('exInLinked')) return;
    const rowEl = e.target.closest('[data-inrow]');
    const idx = Number(rowEl.dataset.inrow);
    const linkedId = e.target.value;
    const current = {
      oshiName: rowEl.querySelector('.exInOshi')?.value||'',
      name: rowEl.querySelector('.exInName')?.value||'',
      qty: Number(rowEl.querySelector('.exInQty').value)||1,
      linkedItemId: linkedId,
      releaseId: rowEl.querySelector('.exInRelease').value||'',
    };
    rowEl.outerHTML = inRowHtml(current, idx);
  });

  function buildDmText(){
    const t = state.dmTemplates.find(x=>x.id===document.getElementById('exDmSelect').value);
    if(!t) return '';
    const ship = state.shippingMethods.find(s=>s.id===document.getElementById('exShip').value);
    const pack = state.packingMethods.find(p=>p.id===document.getElementById('exPack').value);
    let text = t.body;
    text = text.replaceAll('［発送方法］', ship?ship.name:document.getElementById('exDelivery').value);
    text = text.replaceAll('［梱包方法］', pack?pack.name:'［梱包方法］');
    text = text.replaceAll('［金額］', document.getElementById('exShortfall').value ? yen(document.getElementById('exShortfall').value) : '［金額］');
    return text;
  }
  function refreshDm(){
    const text = buildDmText();
    const box=document.getElementById('exCopyBox'); const btn=document.getElementById('exCopyBtn');
    if(text){ box.style.display='block'; box.value=text; btn.style.display='block'; } else { box.style.display='none'; btn.style.display='none'; }
  }
  function refreshSettlementVisibility(){
    document.getElementById('exSettlementFields').style.display = document.getElementById('exSettlementNeeded').checked ? 'block' : 'none';
  }
  document.getElementById('exSettlementNeeded').addEventListener('change', refreshSettlementVisibility);
  function refreshPartnerHint(){
    const userVal = document.getElementById('exPartnerUser').value.trim();
    const accVal = document.getElementById('exPartnerAccount').value.trim();
    const hint = document.getElementById('exPartnerHint');
    if(!userVal && !accVal){ hint.style.display='none'; return; }
    const candidate = state.exchangeRecords.find(r=>{
      const un = r.partnerUserName||'', an = r.partnerAccountName||'';
      const userHit = userVal && un && un!==userVal && (un.includes(userVal) || userVal.includes(un));
      const accHit = accVal && an && an!==accVal && (an.includes(accVal) || accVal.includes(an));
      return userHit || accHit;
    });
    if(candidate){
      hint.style.display='block';
      hint.innerHTML = `もしかして：<b>${escapeHtml(candidate.partnerUserName||'')}${candidate.partnerAccountName?'（'+escapeHtml(candidate.partnerAccountName)+'）':''}</b> ですか？ <button type="button" class="btn btn-ghost btn-sm" id="exPartnerHintUse" style="margin-left:6px;">これを使う</button>`;
      const useBtn = document.getElementById('exPartnerHintUse');
      if(useBtn) useBtn.onclick=()=>{
        document.getElementById('exPartnerUser').value = candidate.partnerUserName||'';
        document.getElementById('exPartnerAccount').value = candidate.partnerAccountName||'';
        hint.style.display='none';
      };
    } else { hint.style.display='none'; }
  }
  document.getElementById('exPartnerUser').addEventListener('input', refreshPartnerHint);
  document.getElementById('exPartnerAccount').addEventListener('input', refreshPartnerHint);
  ['exDmSelect','exShip','exPack','exShortfall','exDelivery'].forEach(id=>document.getElementById(id).addEventListener('input', refreshDm));
  const histSel = document.getElementById('exDmHistorySelect');
  if(histSel) histSel.addEventListener('input', ()=>{
    const h = state.dmHistory.find(x=>x.id===histSel.value);
    if(h){ document.getElementById('exCopyBox').style.display='block'; document.getElementById('exCopyBox').value=h.text; document.getElementById('exCopyBtn').style.display='block'; }
  });
  document.querySelectorAll('#exDmQuickButtons [data-quickdm]').forEach(lb=>{
    lb.onclick=()=>{
      document.querySelectorAll('#exDmQuickButtons label').forEach(x=>x.style.background='var(--surface)');
      lb.style.background='var(--surface2)';
      document.getElementById('exDmSelect').value = lb.dataset.quickdm;
      refreshDm();
    };
  });
  document.getElementById('genFirstDmBtn').onclick=()=>{
    const outIds = [...document.querySelectorAll('#exOutRows .exOutItem')].map(s=>s.value).filter(Boolean);
    const outItems = outIds.map(id=>state.items.find(i=>i.id===id)).filter(Boolean);
    const scheduledDate = document.getElementById('exScheduled').value;
    const text = generateFirstDmText(outItems, scheduledDate);
    const box=document.getElementById('exCopyBox'); const btn=document.getElementById('exCopyBtn');
    box.style.display='block'; box.value=text; btn.style.display='block';
    showToast('初回DM文面を生成しました。内容を確認・編集してからコピーしてね');
  };
  document.getElementById('exCopyBtn').onclick=async()=>{
    const text = document.getElementById('exCopyBox').value;
    navigator.clipboard.writeText(text); showToast('コピーしました');
    await addDocTo('dmHistory', {text, createdAtStr:new Date().toISOString()});
  };
  document.getElementById('mCancel').onclick=closeModal;
  document.getElementById('ov').onclick=(e)=>{ if(e.target.id==='ov') closeModal(); };
  document.getElementById('mSave').onclick=async()=>{
    document.getElementById('mSave').textContent='保存中…';
    const outItemsLinked = [...document.querySelectorAll('#exOutRows [data-outrow]')].map(row=>({
      itemId: row.querySelector('.exOutItem').value, qty: Number(row.querySelector('.exOutQty').value)||1,
    })).filter(o=>o.itemId);
    const inRowEls = [...document.querySelectorAll('#exInRows [data-inrow]')];
    const inItemsLinked = [];
    for(const row of inRowEls){
      const oshiName = row.querySelector('.exInOshi').value.trim();
      if(!oshiName) continue;
      const entry = {
        oshiName, name: row.querySelector('.exInName').value.trim(),
        qty: Number(row.querySelector('.exInQty').value)||1,
        releaseId: row.querySelector('.exInRelease').value||null,
        linkedItemId: row.querySelector('.exInLinked').value||null,
        imageUrl: null,
      };
      const fileInput = row.querySelector('.exInImage');
      if(fileInput.files[0]){
        try{ entry.imageUrl = await uploadItemImage(fileInput.files[0], 'in_'+uidGen()); }catch(e){ /* 画像アップロード失敗時はスキップ */ }
      }
      inItemsLinked.push(entry);
    }
    const newStatus = document.getElementById('exStatus').value;
    const data={
      dealType:document.getElementById('exDealType').value,
      partnerUserName:document.getElementById('exPartnerUser').value.trim(),
      partnerAccountName:document.getElementById('exPartnerAccount').value.trim(),
      date:document.getElementById('exDate').value,
      outItemsLinked, inItemsLinked,
      shortfallAmount:Number(document.getElementById('exShortfall').value)||0,
      settlementNeeded:document.getElementById('exSettlementNeeded').checked,
      paymentReceived:document.getElementById('exPaymentReceived').checked,
      paymentDate:document.getElementById('exPaymentDate').value||null,
      deliveryMethod:document.getElementById('exDelivery').value,
      scheduledDate:document.getElementById('exScheduled').value||null,
      sameDayWish:document.getElementById('exSameDay').checked,
      shippingMethodId:document.getElementById('exShip').value||null,
      packingMethodId:document.getElementById('exPack').value||null,
      status:newStatus,
      mySent:document.getElementById('exMySent').checked,
      mySentDate:document.getElementById('exMySentDate').value||null,
      myTracking:document.getElementById('exMyTracking').value,
      theirSent:document.getElementById('exTheirSent').checked,
      theirSentDate:document.getElementById('exTheirSentDate').value||null,
      theirTracking:document.getElementById('exTheirTracking').value,
    };
    if(!isEdit || item.status!==newStatus) data.statusUpdatedAt = todayStr();
    const willApplyStock = newStatus==='完了' && !item.stockApplied;
    if(willApplyStock) data.stockApplied = true;
    if(isEdit) await updateDocIn('exchangeRecords', item.id, data); else await addDocTo('exchangeRecords', data);
    if(willApplyStock) await applyExchangeCompletion(data);
    showToast('保存しました'); closeModal();
  };
}

/* ================================================================
   ⑥ 交換履歴一覧
   ================================================================ */
function renderHistoryTab(){
  const done = state.exchangeRecords.filter(r=>r.status==='完了').sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const list = done.length ? done.map(r=>{
    const outTxt = (r.outItemsLinked||[]).map(o=>{ const it=state.items.find(i=>i.id===o.itemId); return it?`${it.oshiName}${it.name?'『'+it.name+'』':''}×${o.qty}`:''; }).filter(Boolean).join('、') || '-';
    const inTxt = (r.inItemsLinked||[]).map(i=>`${i.oshiName}${i.name?'『'+i.name+'』':''}×${i.qty}`).join('、') || '-';
    return `<div class="list-item"><div><div class="meta">${escapeHtml(partnerLabel(r))}</div>
      <div class="sub-meta">${escapeHtml(r.date||'')}　渡す：${escapeHtml(outTxt)}／もらう：${escapeHtml(inTxt)}</div></div></div>`;
  }).join('') : `<div class="empty">完了した交換記録がありません</div>`;
  return `<div class="card"><h2>交換履歴一覧 <span class="badge good">${done.length}件</span></h2>${list}
    <button class="btn btn-ghost btn-block" id="exportHistoryCsvBtn" style="margin-top:10px;">📄 交換履歴をCSVで書き出す</button></div>`;
}
function bindHistoryEvents(){
  const csvBtn=document.getElementById('exportHistoryCsvBtn');
  if(csvBtn) csvBtn.onclick=()=>{
    const done = state.exchangeRecords.filter(r=>r.status==='完了');
    const rows = [['交換日','ユーザー名','アカウント名','渡したグッズ','もらったグッズ','精算金額']];
    done.forEach(r=>{
      const outTxt = (r.outItemsLinked||[]).map(o=>{ const it=state.items.find(i=>i.id===o.itemId); return it?`${it.oshiName}${it.name?'『'+it.name+'』':''}×${o.qty}`:''; }).filter(Boolean).join('、');
      const inTxt = (r.inItemsLinked||[]).map(i=>`${i.oshiName}${i.name?'『'+i.name+'』':''}×${i.qty}`).join('、');
      rows.push([r.date||'', r.partnerUserName||'', r.partnerAccountName||'', outTxt, inTxt, r.shortfallAmount||0]);
    });
    downloadCsv(`交換履歴_${todayStr()}.csv`, rows);
  };
}

applyTheme();
</script>
